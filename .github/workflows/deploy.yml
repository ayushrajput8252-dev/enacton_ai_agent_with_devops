name: Build and Push Docker Images

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Backend
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/enacton-backend:latest ./backend

      - name: Build Frontend
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/enacton-frontend:latest ./frontend

      - name: Push Backend
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/enacton-backend:latest

      - name: Push Frontend
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/enacton-frontend:latest

